<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - Face Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <aside class="w-64 bg-gray-800 text-white flex flex-col">
            <div class="p-6 text-2xl font-bold border-b border-gray-700">FaceTrack</div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="/" class="flex items-center px-4 py-2 text-lg rounded-md hover:bg-gray-700 transition-colors">
                    <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Home
                </a>
                <a href="/register" class="flex items-center px-4 py-2 text-lg rounded-md hover:bg-gray-700 transition-colors">
                    <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                    Register User
                </a>
                <a href="/attendance" class="flex items-center px-4 py-2 text-lg rounded-md bg-gray-700 font-semibold">
                    <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                    Mark Attendance
                </a>
                <a href="/manage_users" class="flex items-center px-4 py-2 text-lg rounded-md hover:bg-gray-700 transition-colors">
                    <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    Manage & Retrain
                </a>
                <a href="/attendance_log" class="flex items-center px-4 py-2 text-lg rounded-md hover:bg-gray-700 transition-colors">
                    <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    Attendance Log
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <h1 class="text-4xl font-bold text-gray-800 mb-8">Mark Attendance</h1>

            <div class="bg-white p-6 rounded-xl shadow-md max-w-2xl mx-auto">
                <div class="flex items-center space-x-4 mb-6">
                    <button id="start" class="px-5 py-2.5 w-full font-medium bg-blue-600 text-white rounded-lg shadow-md hover:bg-blue-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Start Camera</button>
                    <button id="identify" disabled class="px-5 py-2.5 w-full font-medium bg-green-600 text-white rounded-lg shadow-md hover:bg-green-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:bg-gray-400 disabled:cursor-not-allowed">Identify Face</button>
                    <button id="stop" disabled class="px-5 py-2.5 w-full font-medium bg-red-600 text-white rounded-lg shadow-md hover:bg-red-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
    Stop Camera
</button>

                </div>

                <video id="video" autoplay muted  class="bg-gray-900 rounded-lg shadow-inner mb-6 mx-auto block max-w-full w-[450px] h-[330px] object-cover">
                </video>

                <div id="result" class="p-4 min-h-[6rem] text-center text-lg font-medium text-gray-700 bg-gray-50 rounded-lg border border-gray-200 flex items-center justify-center">
                    Please start the camera and identify a face.
                </div>
            </div>
        </main>
    </div>
<script>
let stream=null;
const video=document.getElementById('video');
const startBtn=document.getElementById('start');
const identifyBtn=document.getElementById('identify');
const resultDiv=document.getElementById('result');

// Custom alert function (optional)
function showModal(message, isError = false) {
    const modalBg = document.createElement('div');
    modalBg.className = "fixed top-0 left-0 w-full h-full bg-black bg-opacity-50 flex justify-center items-center z-50";
    const modalContent = document.createElement('div');
    modalContent.className = "bg-white p-8 rounded-lg shadow-xl text-center";
    modalContent.innerHTML = `<p class="text-lg mb-6">${message}</p><button class="px-5 py-2 rounded-lg text-white ${isError ? 'bg-red-500' : 'bg-blue-500'}">OK</button>`;
    modalBg.appendChild(modalContent);
    document.body.appendChild(modalBg);
    modalContent.querySelector('button').onclick = () => document.body.removeChild(modalBg);
}

startBtn.onclick = async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    startBtn.disabled = true;
    identifyBtn.disabled = false;
    stopBtn.disabled = false;   
  } catch (e) {
    showModal("Could not access the camera: " + e, true);
  }
};


identifyBtn.onclick = async () => {
  if (!stream) return;

  // Use a temporary canvas to capture the frame
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = video.videoWidth || 640;
  tempCanvas.height = video.videoHeight || 480;
  const ctx = tempCanvas.getContext('2d');
  ctx.drawImage(video,0,0, tempCanvas.width, tempCanvas.height);
  const dataURL = tempCanvas.toDataURL('image/jpeg', 0.9); // Send this dataURL

  resultDiv.innerHTML = `<div class="flex items-center justify-center"><svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Identifying...</div>`;
  identifyBtn.disabled = true;

  try {
    const resp = await fetch('/api/identify', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({image: dataURL})
    });
    const data = await resp.json();
    if (!resp.ok) {
        resultDiv.innerHTML = `<span class="text-red-600 font-bold">Error:</span> ${data.message || 'Server error'}`;
        return;
    }
    if (data.status === 'ok') {
        resultDiv.innerHTML = `<span class="text-green-600 font-bold">Recognized:</span> <b>${data.name}</b> (Score: ${Number(data.score).toFixed(3)})<br><span class="text-sm text-gray-500">Attendance marked.</span>`;
    } else if (data.status === 'unknown') {
        resultDiv.innerHTML = `<span class="text-yellow-600 font-bold">Unknown Face</span> (Best score: ${data.score?.toFixed ? data.score.toFixed(3) : 'N/A'})`;
    } else {
        resultDiv.innerHTML = `<span class="text-red-600 font-bold">Error:</span> ${data.message || 'An unknown error occurred'}`;
    }
  } catch (err) {
    resultDiv.innerHTML = `<span class="text-red-600 font-bold">Network Error:</span> Could not connect to the server.`;
  } finally {
      identifyBtn.disabled = false;
  }
};
const stopBtn = document.getElementById('stop');

stopBtn.onclick = () => {
    if (stream) {
        stream.getTracks().forEach(track => track.stop()); // stop webcam
        video.srcObject = null;

        startBtn.disabled = false;
        identifyBtn.disabled = true;
        stopBtn.disabled = true;

        resultDiv.innerHTML = `<span class="text-blue-600 font-medium">Camera stopped.</span>`;
    }
};

</script>\
</body>
</html>
